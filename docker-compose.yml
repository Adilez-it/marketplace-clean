services:

  # ═══════ DATABASES ═══════

  productdb:
    image: mongo:7.0
    container_name: productdb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: productdb
    volumes:
      - productdb_data:/data/db
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  orderdb:
    image: mongo:7.0
    container_name: orderdb
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: orderdb
    volumes:
      - orderdb_data:/data/db
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ═══════ MONGO EXPRESS — Interfaces Web ═══════

  mongo-express-products:
    image: mongo-express:latest
    container_name: mongo-express-products
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@productdb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      productdb:
        condition: service_healthy
    networks:
      - marketplace-network

  mongo-express-orders:
    image: mongo-express:latest
    container_name: mongo-express-orders
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@orderdb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      orderdb:
        condition: service_healthy
    networks:
      - marketplace-network

  neo4j:
    image: neo4j:5.15
    container_name: neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    mem_limit: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════ MESSAGE BUS ═══════

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ═══════ CODE QUALITY - SONARQUBE ═══════

  postgres-sonar:
    image: postgres:15
    container_name: postgres-sonar
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar123
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres-sonar:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar123
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      postgres-sonar:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ═══════ MICROSERVICES ═══════

  product.api:
    image: product-api:latest
    container_name: product.api
    build:
      context: ./Product.API
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - MongoDbSettings__ConnectionString=mongodb://admin:admin123@productdb:27017
      - MongoDbSettings__DatabaseName=productdb
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
    depends_on:
      productdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  order.api:
    image: order-api:latest
    container_name: order.api
    build:
      context: ./Order.API
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - MongoDbSettings__ConnectionString=mongodb://admin:admin123@orderdb:27017
      - MongoDbSettings__DatabaseName=orderdb
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - ProductService__BaseUrl=http://product.api:8080
    depends_on:
      orderdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product.api:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  recommendation.api:
    image: recommendation-api:latest
    container_name: recommendation.api
    build:
      context: ./Recommendation.API
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Neo4jSettings__Uri=bolt://neo4j:7687
      - Neo4jSettings__Username=neo4j
      - Neo4jSettings__Password=password123
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - ProductService__BaseUrl=http://product.api:8080
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product.api:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  apigateway:
    image: apigateway:latest
    container_name: apigateway
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - product.api
      - order.api
      - recommendation.api
    networks:
      - marketplace-network

  # ═══════ DEVOPS ═══════

  rabbitmq-ui:
    image: rabbitmq:3.12-management-alpine
    profiles: ["devtools"]

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
      - "8888:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - marketplace-network

volumes:
  productdb_data:
  orderdb_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  rabbitmq_data:
  portainer_data:
  postgres_sonar_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  marketplace-network:
    driver: bridge